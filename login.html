<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Connexion · V.A.L.E.U.R©</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--gold-g:rgba(201,168,76,.2);
  --navy:#070D1A;--navy2:#0D1526;
  --glass:rgba(255,255,255,.04);--gb:rgba(255,255,255,.09);
  --text:#F2EDE6;--muted:#8A9BB5;
  --violet:#805AD5;--blue:#3182CE;
  --err-bg:rgba(229,62,62,.1);--err-b:rgba(229,62,62,.3);--err-t:#FC8181;
  --ok-bg:rgba(56,161,105,.1);--ok-b:rgba(56,161,105,.3);--ok-t:#68D391;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{
  background:var(--navy);color:var(--text);
  font-family:'Jost',sans-serif;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(120px);animation:drift 22s ease-in-out infinite}
.o1{width:600px;height:600px;background:var(--violet);top:-200px;left:-150px;opacity:.18;animation-delay:0s}
.o2{width:500px;height:500px;background:var(--blue);bottom:-180px;right:-120px;opacity:.16;animation-delay:-8s}
.o3{width:380px;height:380px;background:var(--gold);top:35%;right:25%;opacity:.08;animation-delay:-16s}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(50px,-45px) scale(1.07)}
  66%{transform:translate(-35px,55px) scale(.95)}
}

/* ── CARD ── */
.card{
  position:relative;z-index:1;
  background:rgba(13,21,38,.88);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,.1);border-radius:28px;
  padding:48px 40px 40px;width:100%;max-width:440px;
  box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  animation:cardIn .65s cubic-bezier(.34,1.15,.64,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.96)}to{opacity:1;transform:none}}
@media(max-width:480px){.card{padding:36px 22px 30px;border-radius:22px}}

/* ── BRAND ── */
.brand{text-align:center;margin-bottom:32px}
.logo{
  font-family:'Cormorant Garamond',serif;font-size:2.1rem;letter-spacing:.28em;
  background:linear-gradient(135deg,var(--gold),var(--gold-l),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-bottom:5px;
}
.tagline{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.92rem;
  color:var(--muted);line-height:1.5;display:block;margin-bottom:14px;
}
.sep{width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto}

/* ── TABS ── */
.tabs{
  display:flex;background:rgba(255,255,255,.035);border:1px solid var(--gb);
  border-radius:12px;padding:4px;gap:4px;margin-bottom:26px;position:relative;
}
.tab{
  flex:1;padding:10px;border:none;background:transparent;
  color:var(--muted);font-family:'Jost',sans-serif;font-size:.81rem;font-weight:400;
  letter-spacing:.07em;cursor:pointer;border-radius:9px;transition:color .25s;z-index:1;position:relative;
}
.tab.on{color:var(--gold)}
.tab-bg{
  position:absolute;top:4px;bottom:4px;left:4px;
  width:calc(50% - 6px);background:rgba(201,168,76,.11);
  border:1px solid rgba(201,168,76,.22);border-radius:9px;
  transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.tab-bg.r{transform:translateX(calc(100% + 4px))}

/* ── ALERT ── */
.alert{border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:.82rem;line-height:1.6;display:none;animation:aIn .3s ease both}
@keyframes aIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.alert.e{background:var(--err-bg);border:1px solid var(--err-b);color:var(--err-t);display:block}
.alert.s{background:var(--ok-bg);border:1px solid var(--ok-b);color:var(--ok-t);display:block}

/* ── VIEWS ── */
.view{display:none;animation:vIn .32s ease both}
.view.on{display:block}
@keyframes vIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

/* ── FIELD ── */
.f{position:relative;margin-bottom:16px}
.fi{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;
  padding:22px 16px 8px;color:var(--text);
  font-family:'Jost',sans-serif;font-size:.9rem;font-weight:300;
  outline:none;transition:border-color .28s,background .28s;-webkit-appearance:none;
}
.fi:focus{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.03)}
.fi::placeholder{color:transparent}
.fl{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:.87rem;font-family:'Jost',sans-serif;
  transition:all .24s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.fi:focus~.fl,.fi:not(:placeholder-shown)~.fl{
  top:11px;transform:none;font-size:.65rem;color:var(--gold);letter-spacing:.09em;text-transform:uppercase;
}
.eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:.88rem;padding:4px;transition:color .2s;
}
.eye:hover{color:var(--text)}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:16px;margin-top:6px;border:none;border-radius:12px;
  font-family:'Jost',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.08em;
  cursor:pointer;transition:all .28s;display:flex;align-items:center;justify-content:center;gap:10px;
  position:relative;overflow:hidden;
}
.btn-gold{
  background:linear-gradient(135deg,#d4933a,var(--gold),var(--gold-l));
  color:#0a0e1a;box-shadow:0 6px 24px rgba(201,168,76,.28);
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(201,168,76,.44)}
.btn-ghost{background:transparent;border:1px solid var(--gb);color:var(--muted);margin-top:10px}
.btn-ghost:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
.btn:disabled{opacity:.55;cursor:default;transform:none!important}
.spin{width:17px;height:17px;border:2px solid rgba(0,0,0,.18);border-top-color:#000;border-radius:50%;animation:sp .7s linear infinite;display:none;flex-shrink:0}
.btn.ld .btn-t{opacity:.45}
.btn.ld .spin{display:block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── LINK ── */
.lnk{background:none;border:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:.79rem;cursor:pointer;transition:color .2s;padding:0;text-decoration:underline;text-decoration-color:transparent}
.lnk:hover{color:var(--gold-l);text-decoration-color:rgba(240,208,128,.4)}

/* ── DIVIDER ── */
.div{display:flex;align-items:center;gap:10px;margin:16px 0}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--gb)}
.div span{font-size:.7rem;color:var(--muted);letter-spacing:.1em;white-space:nowrap}

/* ── FOOTER ── */
.footer{margin-top:26px;padding-top:18px;border-top:1px solid var(--gb);text-align:center;font-size:.68rem;color:rgba(138,155,181,.4);line-height:1.75}

/* ── MODAL RESET ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:rgba(11,19,35,.97);border:1px solid var(--gb);border-radius:22px;padding:34px;max-width:370px;width:100%;animation:cardIn .38s cubic-bezier(.34,1.2,.64,1) both}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:6px}
.modal p{font-size:.82rem;color:var(--muted);margin-bottom:20px;line-height:1.65}
.row{display:flex;gap:10px;margin-top:6px}
.btn-sm{flex:1;padding:13px 16px;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-sm-gold{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#0a0e1a;box-shadow:0 4px 16px rgba(201,168,76,.25)}
.btn-sm-ghost{background:transparent;border:1px solid var(--gb);color:var(--muted)}
.btn-sm-ghost:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
</style>
</head>
<body>

<div class="aurora">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
</div>

<div class="card">
  <!-- BRAND -->
  <div class="brand">
    <span class="logo">V·A·L·E·U·R©</span>
    <span class="tagline">Les 7 peurs qui empêchent d&rsquo;être soi</span>
    <div class="sep"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" id="t-login" onclick="switchTab('login')">Me connecter</button>
    <button class="tab" id="t-signup" onclick="switchTab('signup')">Créer mon compte</button>
    <div class="tab-bg" id="tab-bg"></div>
  </div>

  <!-- ALERT -->
  <div class="alert" id="alert"></div>

  <!-- VUE LOGIN -->
  <div class="view on" id="v-login">
    <div class="f">
      <input class="fi" id="l-email" type="email" placeholder=" " autocomplete="email"/>
      <label class="fl" for="l-email">Adresse email</label>
    </div>
    <div class="f">
      <input class="fi" id="l-pwd" type="password" placeholder=" " autocomplete="current-password"/>
      <label class="fl" for="l-pwd">Mot de passe</label>
      <button class="eye" onclick="togglePwd('l-pwd',this)" tabindex="-1" aria-label="Voir le mot de passe">👁</button>
    </div>
    <div style="text-align:right;margin:-4px 0 18px">
      <button class="lnk" onclick="openReset()">Mot de passe oublié ?</button>
    </div>
    <button class="btn btn-gold" id="btn-login" onclick="doLogin()">
      <div class="spin"></div>
      <span class="btn-t">Accéder à mon espace →</span>
    </button>
  </div>

  <!-- VUE SIGNUP -->
  <div class="view" id="v-signup">
    <div class="f">
      <input class="fi" id="s-prenom" type="text" placeholder=" " autocomplete="given-name"/>
      <label class="fl" for="s-prenom">Votre prénom</label>
    </div>
    <div class="f">
      <input class="fi" id="s-email" type="email" placeholder=" " autocomplete="email"/>
      <label class="fl" for="s-email">Adresse email</label>
    </div>
    <div class="f">
      <input class="fi" id="s-pwd" type="password" placeholder=" " autocomplete="new-password"/>
      <label class="fl" for="s-pwd">Choisir un mot de passe (6 car. min.)</label>
      <button class="eye" onclick="togglePwd('s-pwd',this)" tabindex="-1" aria-label="Voir le mot de passe">👁</button>
    </div>
    <div class="f">
      <input class="fi" id="s-confirm" type="password" placeholder=" " autocomplete="new-password"/>
      <label class="fl" for="s-confirm">Confirmer le mot de passe</label>
    </div>
    <button class="btn btn-gold" id="btn-signup" onclick="doSignup()">
      <div class="spin"></div>
      <span class="btn-t">Créer mon espace membre →</span>
    </button>
    <div class="div"><span>Déjà membre ?</span></div>
    <button class="btn btn-ghost" onclick="switchTab('login')">
      <span class="btn-t">Me connecter</span>
    </button>
  </div>

  <div class="footer">
    © 2025 Méthode V.A.L.E.U.R© · Céline Bourbon · Psychologue<br>
    Toute reproduction interdite · Propriété exclusive
  </div>
</div>

<!-- MODAL MOT DE PASSE OUBLIÉ -->
<div class="modal-bg" id="modal-reset">
  <div class="modal">
    <h3>Réinitialiser</h3>
    <p>Entrez votre email — vous recevrez un lien pour choisir un nouveau mot de passe.</p>
    <div class="alert" id="alert-reset"></div>
    <div class="f">
      <input class="fi" id="r-email" type="email" placeholder=" "/>
      <label class="fl" for="r-email">Adresse email</label>
    </div>
    <div class="row">
      <button class="btn-sm btn-sm-gold" id="btn-reset" onclick="doReset()">
        <div class="spin" id="sp-reset"></div>
        <span id="t-reset">Envoyer le lien</span>
      </button>
      <button class="btn-sm btn-sm-ghost" onclick="closeReset()">Annuler</button>
    </div>
  </div>
</div>

<script>
const SB = supabase.createClient(
  'https://ecetwkusxzbqoztokgtk.supabase.co',
  'sb_publishable_OAESsD6hq6D38azq6Pjxuw_28frwX6M'
);

/* Redirect si déjà connecté */
(async()=>{
  const {data:{session}}=await SB.auth.getSession();
  if(session) window.location.href='index.html';
})();

/* ── TABS ── */
let tab='login';
function switchTab(t){
  tab=t;
  const isL=t==='login';
  document.getElementById('t-login').className='tab'+(isL?' on':'');
  document.getElementById('t-signup').className='tab'+(!isL?' on':'');
  document.getElementById('tab-bg').className='tab-bg'+(isL?'':' r');
  document.getElementById('v-login').className='view'+(isL?' on':'');
  document.getElementById('v-signup').className='view'+(!isL?' on':'');
  clearAlert();
}

/* ── ALERT ── */
function showAlert(msg,type='e'){
  const el=document.getElementById('alert');
  el.textContent=msg;el.className='alert '+type;
}
function clearAlert(){document.getElementById('alert').className='alert'}

/* ── LOADING ── */
function setLoading(id,on){
  const b=document.getElementById(id);
  b.classList.toggle('ld',on);b.disabled=on;
}

/* ── EYE TOGGLE ── */
function togglePwd(id,btn){
  const i=document.getElementById(id);
  i.type=i.type==='text'?'password':'text';
  btn.textContent=i.type==='text'?'🙈':'👁';
}

/* ── ERREURS SUPABASE → FR ── */
function fr(msg){
  if(!msg) return 'Une erreur est survenue.';
  if(msg.includes('Invalid login credentials')) return 'Email ou mot de passe incorrect.';
  if(msg.includes('Email not confirmed')) return 'Veuillez confirmer votre email avant de vous connecter.';
  if(msg.includes('already registered')||msg.includes('User already registered')) return 'Cet email est déjà utilisé. Connectez-vous.';
  if(msg.includes('Password should be')) return 'Le mot de passe doit contenir au moins 6 caractères.';
  if(msg.includes('rate limit')||msg.includes('too many')) return 'Trop de tentatives. Patientez quelques minutes.';
  if(msg.includes('Network')||msg.includes('Failed to fetch')) return 'Erreur réseau. Vérifiez votre connexion.';
  return msg;
}

/* ── LOGIN ── */
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pwd=document.getElementById('l-pwd').value;
  clearAlert();
  if(!email||!pwd){showAlert('Veuillez remplir tous les champs.');return;}
  setLoading('btn-login',true);
  const {error}=await SB.auth.signInWithPassword({email,password:pwd});
  setLoading('btn-login',false);
  if(error){showAlert(fr(error.message));return;}
  window.location.href='index.html';
}

/* ── SIGNUP ── */
async function doSignup(){
  const prenom=document.getElementById('s-prenom').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const pwd=document.getElementById('s-pwd').value;
  const confirm=document.getElementById('s-confirm').value;
  clearAlert();
  if(!prenom||!email||!pwd){showAlert('Veuillez remplir tous les champs.');return;}
  if(pwd!==confirm){showAlert('Les mots de passe ne correspondent pas.');return;}
  if(pwd.length<6){showAlert('Le mot de passe doit contenir au moins 6 caractères.');return;}
  setLoading('btn-signup',true);
  const {data,error}=await SB.auth.signUp({
    email,password:pwd,
    options:{data:{prenom},emailRedirectTo:window.location.origin+'/index.html'}
  });
  setLoading('btn-signup',false);
  if(error){showAlert(fr(error.message));return;}
  if(data?.user){
    await SB.from('user_profiles').upsert({id:data.user.id,email,prenom},{onConflict:'id'});
    if(data.session){window.location.href='index.html';return;}
  }
  showAlert('✓ Un email de confirmation vous a été envoyé. Cliquez sur le lien puis revenez vous connecter.','s');
}

/* ── RESET ── */
function openReset(){document.getElementById('modal-reset').classList.add('on')}
function closeReset(){
  document.getElementById('modal-reset').classList.remove('on');
  document.getElementById('alert-reset').className='alert';
}
async function doReset(){
  const email=document.getElementById('r-email').value.trim();
  const al=document.getElementById('alert-reset');
  if(!email){al.textContent='Entrez votre email.';al.className='alert e';return;}
  document.getElementById('btn-reset').disabled=true;
  document.getElementById('sp-reset').style.display='inline-block';
  document.getElementById('t-reset').style.opacity='.45';
  const {error}=await SB.auth.resetPasswordForEmail(email,{
    redirectTo:window.location.origin+'/login.html'
  });
  document.getElementById('btn-reset').disabled=false;
  document.getElementById('sp-reset').style.display='none';
  document.getElementById('t-reset').style.opacity='1';
  if(error){al.textContent=fr(error.message);al.className='alert e';}
  else{al.textContent='✓ Email envoyé. Vérifiez votre boîte mail.';al.className='alert s';}
}

/* ── ENTER ── */
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(tab==='login')doLogin();else doSignup();
});

/* ── CLOSE MODAL ON OUTSIDE CLICK ── */
document.getElementById('modal-reset').addEventListener('click',function(e){
  if(e.target===this)closeReset();
});
</script>
</body>
</html>
